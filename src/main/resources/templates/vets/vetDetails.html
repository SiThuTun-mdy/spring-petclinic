<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org"
  th:replace="~{fragments/layout :: layout (~{::body},'vets')}">

  <body>
  
  
    <h2 th:text="#{vetInformation}">Vet Information</h2>

    <div th:if="${message}" class="alert alert-success" id="success-message">
      <span th:text="${message}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger" id="error-message">
      <span th:text="${error}"></span>
    </div>




    <table class="table table-striped" th:object="${vet}">
      <tr>
        <th th:text="#{name}">Name</th>
        <td><b th:text="*{firstName + ' ' + lastName}"></b></td>
      </tr>
      <tr>
        <th th:text="#{speciality}">Speciality</th>
        <td><span th:each="specialty : ${vet.specialties}"
                  th:text="${specialty.name + ' '}"/> <span
          th:if="${vet.nrOfSpecialties == 0}" th:text="#{none}">none</span></td>
      </tr>

    </table>
  
    <a th:href="@{__${vet.id}__/edit}" class="btn btn-primary"  th:text="#{editVet}">Edit
      Vet</a>

  
    <br />
    <br />
    <br />
  

    <script>
    // Function to hide the success and error messages after 3 seconds
    function hideMessages() {
        setTimeout(function() {
            document.getElementById("success-message").style.display = "none";
            document.getElementById("error-message").style.display = "none";
        }, 3000); // 3000 milliseconds (3 seconds)
    }

    // Call the function to hide messages
    hideMessages();
</script>

  </body>


</html>
