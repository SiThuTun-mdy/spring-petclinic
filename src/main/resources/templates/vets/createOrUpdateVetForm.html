<html xmlns:th="https://www.thymeleaf.org"
  th:replace="~{fragments/layout :: layout (~{::body},'vets')}">

<body>

  <h2 th:text="#{vet}">Vet</h2>
  <form th:object="${vet}" class="form-horizontal" id="add-vet-form" method="post">
    <div class="form-group has-feedback">
      <input
        th:replace="~{fragments/inputField :: input (#{firstName}, 'firstName', 'text')}" />
      <input
        th:replace="~{fragments/inputField :: input (#{lastName}, 'lastName', 'text')}" />
      <input
        th:replace="~{fragments/selectField :: select ('Speciality', 'specialties', ${specialties})}" />
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button
          th:with="text=${vet['new']} ? #{addVet} : #{updateVet}"
          class="btn btn-primary" type="submit" th:text="${text}">Add
          Vet</button>
      </div>
    </div>
  </form>
</body>
</html>
